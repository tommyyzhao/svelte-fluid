name: Release

on:
  push:
    branches: [main]
  # Manual trigger for the very first publish (v0.1.0) before any
  # changesets exist. Subsequent releases use the push-driven flow.
  workflow_dispatch:

# One release attempt at a time.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# id-token: write enables npm provenance via GitHub OIDC.
# contents: write lets the action push the Version PR + tags.
# pull-requests: write lets it open the Version PR.
permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Version PR or publish
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # changesets needs full history to detect changesets across commits.
          fetch-depth: 0

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Setup Node (for npm publish)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build library
        run: bun run prepack

      # Manual dispatch path — direct publish using the version already
      # in package.json. Used for the initial release (v0.1.0) before
      # any changesets exist. From v0.1.1 onward, releases run through
      # the push-driven changesets flow below.
      - name: Direct publish (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Push path — if `.changeset/*.md` files exist, opens a "Version
      # Packages" PR. When that PR is merged (no remaining changesets),
      # runs `publish`.
      - name: Create Release PR or publish (changesets)
        if: github.event_name == 'push'
        uses: changesets/action@v1
        with:
          version: bun run changeset version
          publish: bun run release
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          # Provenance writes a verified-build attestation to npm.
          NPM_CONFIG_PROVENANCE: 'true'
